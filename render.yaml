services:
  - type: web
    name: spy-ai
    env: python
    buildCommand: pip install -r requirements.txt && pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl
    startCommand: gunicorn app:app --timeout 120 --workers 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /data/spy_ai_cache.db
    disk:
      name: spy-ai-data
      mountPath: /data
      sizeGB: 1
