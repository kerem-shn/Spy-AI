services:
  - type: web
    name: spy-ai
    env: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: gunicorn app:app --timeout 120 --workers 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DATABASE_PATH
        value: /data/spy_ai_cache.db
    disk:
      name: spy-ai-data
      mountPath: /data
      sizeGB: 1
