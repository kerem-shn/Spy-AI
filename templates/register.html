<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Registration — Spy AI</title>
    <link rel="stylesheet" href="/static/themes.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-main { display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 20px; }
        .login-card { width: 100%; max-width: 440px; background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border-subtle); border-radius: 24px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); animation: panelIn 0.5s ease; }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-title { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--grad-start), var(--grad-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        .login-btn { width: 100%; justify-content: center; margin-top: 12px; padding: 14px; font-size: 1rem; }
        .flash-messages { margin-bottom: 20px; }
        .flash-msg { padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; background: rgba(244, 63, 94, 0.1); color: var(--accent-rose); border: 1px solid rgba(244, 63, 94, 0.2); }
        .login-link { text-align: center; margin-top: 24px; font-size: 0.88rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="bg-animation" aria-hidden="true">
        <div class="bg-orb bg-orb--1"></div>
        <div class="bg-orb bg-orb--2"></div>
        <div class="bg-orb bg-orb--3"></div>
    </div>

    <main class="login-main">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">Teacher Registration</h1>
                <p class="login-subtitle" style="color:var(--text-secondary)">Create an account to view student results</p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash-messages">
                  {% for message in messages %}
                    <div class="flash-msg">{{ message }}</div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form action="/register" method="POST">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="input" placeholder="e.g. Prof. Smith" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Create Password</label>
                    <input type="password" name="password" class="input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn--primary login-btn">Register</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="/login">Sign In</a>
            </div>
        </div>
    </main>
</body>
</html>
