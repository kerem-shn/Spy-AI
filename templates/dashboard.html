<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard — Spy AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/themes.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .dashboard-main { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        .dashboard-header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; }
        .dashboard-title { font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, var(--grad-start), var(--grad-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }

        /* ── Live Stats ── */
        .stats-row { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
        .stat-card {
            background: var(--bg-card); backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle); border-radius: 18px;
            padding: 18px 24px; flex: 1; min-width: 180px;
            display: flex; flex-direction: column; gap: 4px;
            animation: panelIn 0.4s ease;
        }
        .stat-card__label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
        .stat-card__value { font-size: 1.6rem; font-weight: 900; color: var(--text-primary); }
        .stat-card__trend { font-size: 0.72rem; font-weight: 600; }
        .trend--up { color: #22c55e; }

        /* ── Table Container ── */
        .results-table-container {
            background: var(--bg-card); backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle); border-radius: 24px;
            overflow: hidden; animation: panelIn 0.5s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
        }
        .results-table { width: 100%; border-collapse: collapse; text-align: left; }
        .results-table th {
            padding: 18px 24px; background: rgba(0,0,0,0.02);
            font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-muted);
            border-bottom: 1px solid var(--border-subtle);
        }
        .results-table td {
            padding: 16px 24px; border-bottom: 1px solid var(--border-subtle);
            font-size: 0.95rem; color: var(--text-primary); vertical-align: middle;
        }
        .results-table tr:last-child td { border-bottom: none; }
        .results-table tr:hover td { background: rgba(0,212,255,0.02); transition: background .15s; }

        /* Score & UI Pills */
        .score-pill {
            padding: 5px 14px; border-radius: 20px;
            font-weight: 800; font-family: 'JetBrains Mono', monospace; font-size: 0.88rem;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .score-pill--high { background: rgba(16,185,129,0.1); color: #10b981; }
        .score-pill--mid  { background: rgba(245,158,11,0.1);  color: #f59e0b; }
        .score-pill--low  { background: rgba(244,63,94,0.1);   color: #f43f5e; }

        .progress-row td { background: rgba(0,212,255,0.01); }
        .live-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2);
            border-radius: 20px; padding: 4px 12px;
            font-size: 0.75rem; font-weight: 800; color: #00d4ff;
            font-family: 'JetBrains Mono', monospace;
        }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%; background: #00d4ff;
            animation: pulse-dot 1.4s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100%{ opacity:1; box-shadow:0 0 0 0 rgba(0,212,255,.4); }
            50%{ opacity:.5; box-shadow:0 0 0 4px rgba(0,212,255,0); }
        }

        .bar-wrap { width: 100px; height: 6px; background: rgba(0,0,0,0.06); border-radius: 100px; overflow: hidden; margin-left: 12px; display: inline-block; vertical-align: middle; }
        .bar-inner { height: 100%; border-radius: 100px; background: linear-gradient(90deg, #00d4ff, #7c3aed); transition: width .6s cubic-bezier(.4,0,.2,1); }

        .divider-row td {
            padding: 12px 24px; background: rgba(0,0,0,0.03);
            font-size: 0.72rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-muted);
            border-bottom: 1px solid var(--border-subtle);
        }

        .student-info { display: flex; flex-direction: column; }
        .student-id { font-size: 0.72rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

        .empty-state { text-align: center; padding: 80px 24px; color: var(--text-muted); }

        @media (max-width: 768px) {
            .dashboard-main { padding: 20px 14px; }
            .dashboard-title { font-size: 1.6rem; }
            .results-table thead { display: none; }
            .results-table, .results-table tbody, .results-table tr, .results-table td { display: block; width: 100%; }
            .results-table tr { padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); }
            .results-table td { padding: 5px 0; border: none; display: flex; justify-content: space-between; align-items: center; font-size: 0.92rem; }
            .results-table td::before { font-weight: 700; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-right: 12px; }
            .results-table td:nth-child(1)::before { content: 'Student'; }
            .results-table td:nth-child(2)::before { content: 'Test'; }
            .results-table td:nth-child(3)::before { content: 'Score'; }
            .results-table td:nth-child(4)::before { content: 'Date'; }
            .divider-row td { display: block; }
        }
    </style>
</head>
<body>
    <div class="bg-animation" aria-hidden="true">
        <div class="bg-orb bg-orb--1"></div>
        <div class="bg-orb bg-orb--2"></div>
        <div class="bg-orb bg-orb--3"></div>
    </div>

    <header class="header">
        <div class="header__inner">
            <div class="header__brand">
                <div class="header__logo">
                    <svg width="34" height="34" viewBox="0 0 100 100" fill="none">
                        <circle cx="42" cy="42" r="28" stroke="url(#lg)" stroke-width="5" fill="rgba(0,212,255,0.08)" />
                        <text x="42" y="47" text-anchor="middle" font-family="Inter,sans-serif" font-weight="900" font-size="18" fill="url(#lg)">SPY</text>
                        <line x1="62" y1="62" x2="88" y2="88" stroke="url(#lg)" stroke-width="6" stroke-linecap="round" />
                        <defs><linearGradient id="lg" x1="0" y1="0" x2="100" y2="100"><stop offset="0%" stop-color="#00d4ff" /><stop offset="100%" stop-color="#7c3aed" /></linearGradient></defs>
                    </svg>
                </div>
                <h1 class="header__title">Teacher Dashboard</h1>
            </div>
            <div class="header__actions">
                <a href="/" class="btn btn--ghost">Research Tool</a>
                <a href="/logout" class="btn btn--ghost">Logout</a>
            </div>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="dashboard-header">
            <div>
                <h2 class="dashboard-title">Student Performance</h2>
                <p style="color:var(--text-secondary)">Pityriasis Rosea — Exercise Results & Live Tracking</p>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <span class="stat-card__label">Total Submissions</span>
                <span class="stat-card__value" id="stat-total">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-card__label">Average Score</span>
                <span class="stat-card__value" id="stat-avg">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-card__label">Active Students</span>
                <span class="stat-card__value" id="stat-active" style="color:#00d4ff">0</span>
            </div>
        </div>

        <div class="results-table-container">
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Test ID</th>
                        <th>Score</th>
                        <th>Date &amp; Time</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Dynamic content -->
                </tbody>
            </table>
            <div id="empty-state" class="empty-state" hidden>
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:16px;opacity:0.4"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <h3>Waiting for activity...</h3>
                <p>Data will refresh automatically when students start or finish tests.</p>
            </div>
        </div>
    </main>

<script>
async function updateDashboard() {
    try {
        const res = await fetch("/api/teacher/data");
        const data = await res.json();
        const body = document.getElementById("table-body");
        const empty = document.getElementById("empty-state");

        if (!data.completed.length && !data.in_progress.length) {
            body.innerHTML = "";
            empty.hidden = false;
            return;
        }
        empty.hidden = true;

        // Stats
        document.getElementById("stat-total").textContent = data.completed.length;
        document.getElementById("stat-active").textContent = data.in_progress.length;
        if (data.completed.length > 0) {
            const sum = data.completed.reduce((acc, curr) => acc + curr.score, 0);
            document.getElementById("stat-avg").textContent = Math.round(sum / data.completed.length) + "%";
        }

        let html = "";
        
        // Completed
        if (data.completed.length) {
            html += `<tr class="divider-row"><td colspan="4">✓ Completed — Sorted by Score</td></tr>`;
            data.completed.forEach(r => {
                const type = r.score >= 80 ? 'high' : (r.score >= 50 ? 'mid' : 'low');
                html += `<tr>
                    <td>
                        <div class="student-info">
                            <strong>${r.name}</strong>
                            <span class="student-id">${r.id}</span>
                        </div>
                    </td>
                    <td><code style="font-family:'JetBrains Mono';font-size:0.78rem">${r.test_id}</code></td>
                    <td><span class="score-pill score-pill--${type}">${r.score} / 100</span></td>
                    <td style="color:var(--text-muted);font-size:0.82rem">${r.timestamp}</td>
                </tr>`;
            });
        }

        // In Progress
        if (data.in_progress.length) {
            html += `<tr class="divider-row"><td colspan="4">⏳ In Progress — Live Tracking</td></tr>`;
            data.in_progress.forEach(p => {
                const pct = p.total > 0 ? Math.round((p.question_index / p.total) * 100) : 0;
                html += `<tr class="progress-row">
                    <td>
                        <div class="student-info">
                            <strong>${p.name}</strong>
                            <span class="student-id">${p.identifier}</span>
                        </div>
                    </td>
                    <td><code style="font-family:'JetBrains Mono';font-size:0.78rem">${p.test_id}</code></td>
                    <td>
                        <span class="live-badge"><span class="live-dot"></span>Q${p.question_index}/${p.total}</span>
                        <div class="bar-wrap"><div class="bar-inner" style="width:${pct}%"></div></div>
                    </td>
                    <td style="color:var(--text-muted);font-size:0.82rem">${p.updated_at.slice(11,16)}</td>
                </tr>`;
            });
        }

        body.innerHTML = html;
    } catch(e) { console.error("Update failed", e); }
}

updateDashboard();
setInterval(updateDashboard, 5000); // Silent AJAX refresh every 5s
</script>
</body>
</html>
